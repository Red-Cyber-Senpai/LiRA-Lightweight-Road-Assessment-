# LiRA (Light-weight Road Assessment) Configuration
# Developed by: Saketcharan Chauhan M & Abubakr Siddiq Mohammed

system:
  name: "LiRA"
  version: "1.0.0"
  debug: false

detection:
  pothole_variance_threshold: 1.5   # Standard deviation threshold for potholes
  smooth_variance_threshold: 0.2    # Standard deviation threshold for smooth road
  window_size: 10                   # Number of samples for sliding window analysis
  sampling_rate_hz: 5               # Ideal frequency for sensor polling

model_paths:
  yolo_model: "models/yolov8-pothole.pt"
  rf_model: "models/random_forest_road.joblib"

data_handling:
  csv_export_enabled: true
  csv_file: "data/road_assessment_log.csv"
  logging_enabled: true
  log_file: "logs/lira_system.log"

data_sources:
  sensor_url: "http://0.0.0.0:5000/data"
  roboflow_url: "YOUR_ROBOFLOW_URL"
